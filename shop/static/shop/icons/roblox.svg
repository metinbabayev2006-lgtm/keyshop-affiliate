<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111b33"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)"/>

  <!-- Simple diamond mark -->
  <g transform="translate(64 58) rotate(20)">
    <rect x="-22" y="-22" width="44" height="44" rx="8" fill="#ffffff" opacity="0.14"/>
    <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#ffffff" opacity="0.22"/>
  </g>

  <!-- Text -->
  <text x="64" y="98"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        font-weight="700"
        fill="#ffffff">
    Roblox
  </text>
</svg>